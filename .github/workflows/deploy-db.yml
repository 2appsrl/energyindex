name: Deploy DB migrations
# DISABILITATO il trigger automatico on:push. Tutte le migrations
# vengono applicate via Supabase MCP in real-time durante lo sviluppo,
# non via CLI. Il workflow fallisce sempre perche' DB e file sono
# drifted (version timestamp in schema_migrations != prefisso file),
# accumulato negli ultimi mesi. Re-enable solo se si introduce un
# flusso CLI-first deliberato e si fa pulizia della tabella
# schema_migrations.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - run: supabase db push --include-all --linked
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
