<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Energy Index">
  <!-- Background: brand deep emerald, si adatta bene sia a SERP light che dark -->
  <rect width="512" height="512" fill="#0a3d2e"/>
  <!-- Sfumatura verde brillante in alto per profondita' visiva -->
  <defs>
    <radialGradient id="g" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#14d97a" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#0a3d2e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g)"/>
  <!-- Lettera E: verticale + 3 bracci (path geometrici, no font dependency) -->
  <rect x="112" y="130" width="62" height="252" rx="6" fill="#14d97a"/>
  <rect x="112" y="130" width="190" height="62" rx="6" fill="#14d97a"/>
  <rect x="112" y="225" width="168" height="60" rx="6" fill="#14d97a"/>
  <rect x="112" y="320" width="190" height="62" rx="6" fill="#14d97a"/>
  <!-- Lettera I: barra verticale singola -->
  <rect x="340" y="130" width="62" height="252" rx="6" fill="#14d97a"/>
</svg>
