[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
  NODE_VERSION = "20"

# Plugin Next.js 16: gestisce App Router, ISR, Server Components, middleware, routing dinamico.
# Senza questo Netlify trattava .next come folder statico -> 404 su tutte le route.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect host-based: il dominio canonical e` energyindex.it.
# .pro e www.* fanno 301 al canonical via condizione sul Host header.
# `force = true` + Host condition fa scattare il redirect PRIMA del middleware Next.js
# (i redirect Netlify host-conditional hanno priorita` sul plugin Next.js).

[[redirects]]
  from = "/*"
  to = "https://energyindex.it/:splat"
  status = 301
  force = true
  conditions = {Host = ["energyindex.pro"]}

[[redirects]]
  from = "/*"
  to = "https://energyindex.it/:splat"
  status = 301
  force = true
  conditions = {Host = ["www.energyindex.pro"]}

[[redirects]]
  from = "/*"
  to = "https://energyindex.it/:splat"
  status = 301
  force = true
  conditions = {Host = ["www.energyindex.it"]}
